services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "until php artisan migrate --force; do echo 'Waiting for MySQL...'; sleep 3; done; php-fpm"

  mysql:
    image: mysql:8
    container_name: localbusinessindia-mysql-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: localbusinessindia
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -ppassword --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
