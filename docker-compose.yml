services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    volumes:
      - ./:/var/www
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "until php artisan migrate --force; do echo 'Waiting for PostgreSQL...'; sleep 3; done; php-fpm"

  postgres:
    image: postgres:16
    container_name: localbusinessindia-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_DB: localbusinessindia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d localbusinessindia"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  postgres_data:
